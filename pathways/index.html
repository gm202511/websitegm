<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website GM</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); padding: 10px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        nav a { margin: 0 15px; text-decoration: none; color: #333; transition: color 0.3s; }
        nav a:hover { color: #007BFF; }
        .gradient-text { background: linear-gradient(45deg, #6a11cb, #2575fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { border: 1px solid #ddd; border-radius: 5px; padding: 20px; margin: 20px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
    <section>
        <h1 class="gradient-text">Welcome to Website GM</h1>
        <div class="card">
            <h2>Card Title</h2>
            <p>This is a simple card with modern styling and smooth transitions.</p>
        </div>
    </section>
</body>
</html>
