<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cybersecurity Question App</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#0b132b,#1c2541);
  color:#e5e7eb;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  background:rgba(255,255,255,0.09);
  border-radius:18px;
  padding:30px;
  max-width:720px;
  width:92%;
  box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

h1{
  margin:0;
  color:#00eaff;
  text-align:center;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  margin-top:15px;
  gap:10px;
}

select{
  padding:6px;
  border-radius:6px;
}

.score{
  font-weight:bold;
}

.question{
  margin:30px 0;
  text-align:center;
  font-size:1.25em;
}

.answers{
  display:grid;
  gap:12px;
}

.answers button{
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:1em;
  font-weight:bold;
  background:linear-gradient(135deg,#38bdf8,#00eaff);
  color:#001219;
}

.answers button.correct{
  background:linear-gradient(135deg,#22c55e,#4ade80);
}

.answers button.incorrect{
  background:linear-gradient(135deg,#ef4444,#f97316);
  color:white;
}

.feedback{
  margin-top:16px;
  min-height:40px;
  font-weight:bold;
  text-align:center;
}

.controls{
  margin-top:25px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.controls button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#22c55e,#4ade80);
}

.controls a{
  text-decoration:none;
}
</style>
</head>

<body>
<div class="app">

<h1>🎱 Cybersecurity Question App</h1>

<div class="top-bar">
  <div>
    Difficulty:
    <select id="difficulty">
      <option value="all">All</option>
      <option value="Beginner">Beginner</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select>
  </div>
  <div class="score">Score: <span id="score">0</span></div>
</div>

<div id="question" class="question">
  Click the button to get a random Security+ question.
</div>

<div id="answers" class="answers"></div>
<div id="feedback" class="feedback"></div>

<div class="controls">
  <button onclick="newQuestion()">Get Random Question</button>

  <a href="/lessons/cybersecurity/careers.html">
    <button>⬅ Careers</button>
  </a>

  <a href="/cybersecurity.html">
    <button>🔁 Cybersecurity Lessons</button>
  </a>

  <a href="/index.html">
    <button>🏠 Home</button>
  </a>
</div>

</div>

<script>
let score = 0;
let answered = false;
let currentQuestion = null;

const questions = [
/* BEGINNER */
{d:"Beginner",q:"What does the CIA triad represent?",a:["Confidentiality, Integrity, Availability","Control, Inspection, Authorization","Confidentiality, Internet, Access","Cybersecurity, Integrity, Availability"],c:0,e:"The CIA triad defines the three core security goals."},
{d:"Beginner",q:"What is phishing?",a:["Network scanning","Tricking users into giving information","Malware encryption","Password hashing"],c:1,e:"Phishing exploits human trust."},
{d:"Beginner",q:"What does MFA add?",a:["Encryption","Multiple verification factors","Faster logins","Firewall protection"],c:1,e:"MFA requires more than one verification factor."},
{d:"Beginner",q:"What is malware?",a:["Malicious software","Backup software","Security policy","Firewall"],c:0,e:"Malware is software designed to cause harm."},
{d:"Beginner",q:"Why are backups critical?",a:["They prevent attacks","They allow recovery","They block malware","They encrypt data"],c:1,e:"Backups allow systems to be restored."},

/* INTERMEDIATE */
{d:"Intermediate",q:"What is the FIRST step in incident response?",a:["Containment","Identification","Recovery","Eradication"],c:1,e:"An incident must be identified before action."},
{d:"Intermediate",q:"What does least privilege mean?",a:["Everyone is admin","Users get only required access","Privileges reset weekly","Access is temporary"],c:1,e:"Least privilege limits damage."},
{d:"Intermediate",q:"What attack targets people instead of systems?",a:["DoS","SQL Injection","Social engineering","Brute force"],c:2,e:"Social engineering manipulates human behavior."},
{d:"Intermediate",q:"What is lateral movement?",a:["External scanning","Movement inside a network","Traffic filtering","Firewall bypass"],c:1,e:"It describes spreading internally."},
{d:"Intermediate",q:"What does a firewall do?",a:["Encrypt traffic","Filter network traffic","Scan emails","Train users"],c:1,e:"Firewalls control traffic flow."},

/* ADVANCED */
{d:"Advanced",q:"Why preserve evidence during incidents?",a:["Compliance only","To support investigation","To speed recovery","To delete logs"],c:1,e:"Evidence is needed for analysis and legal reasons."},
{d:"Advanced",q:"What is network segmentation used for?",a:["Faster networks","Limiting attacker movement","Encrypting data","Easy access"],c:1,e:"Segmentation reduces lateral spread."},
{d:"Advanced",q:"What is Zero Trust?",a:["Trust internal users","Never trust, always verify","Disable MFA","Open access"],c:1,e:"Zero Trust requires continuous verification."},
{d:"Advanced",q:"What does a SIEM provide?",a:["Direct protection","Centralized logging","Encryption","Hardware security"],c:1,e:"SIEM correlates and analyzes logs."},
{d:"Advanced",q:"What is defense in depth?",a:["Single control","Layered security controls","Fast incident response","Cheap security"],c:1,e:"Multiple layers reduce risk."}
];

function newQuestion(){
  answered = false;
  document.getElementById("feedback").textContent = "";

  const difficulty = document.getElementById("difficulty").value;
  const pool = difficulty === "all"
    ? questions
    : questions.filter(q => q.d === difficulty);

  currentQuestion = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("question").textContent =
    "(" + currentQuestion.d + ") " + currentQuestion.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  currentQuestion.a.forEach((choice, index) => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(index, btn);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(index, btn){
  if(answered) return;
  answered = true;

  const allButtons = document.querySelectorAll(".answers button");
  allButtons.forEach((b, i) => {
    b.disabled = true;
    if(i === currentQuestion.c){
      b.classList.add("correct");
    }
  });

  if(index === currentQuestion.c){
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("feedback").textContent =
      "✅ Correct! " + currentQuestion.e;
  } else {
    btn.classList.add("incorrect");
    document.getElementById("feedback").textContent =
      "❌ " + currentQuestion.e;
  }
}
</script>

</body>
</html>
