<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cybersecurity Question App</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#0b132b,#1c2541);
  color:#e5e7eb;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  background:rgba(255,255,255,0.09);
  border-radius:18px;
  padding:30px;
  max-width:720px;
  width:92%;
  box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

h1{
  margin:0;
  color:#00eaff;
  text-align:center;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  margin-top:15px;
  gap:10px;
}

select{
  padding:6px;
  border-radius:6px;
}

.score{
  font-weight:bold;
}

.question{
  margin:30px 0;
  text-align:center;
  font-size:1.25em;
}

.answers{
  display:grid;
  gap:12px;
}

.answers button{
  padding:14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:1em;
  font-weight:bold;
  background:linear-gradient(135deg,#38bdf8,#00eaff);
  color:#001219;
}

.answers button.correct{
  background:linear-gradient(135deg,#22c55e,#4ade80);
}

.answers button.incorrect{
  background:linear-gradient(135deg,#ef4444,#f97316);
  color:white;
}

.feedback{
  margin-top:16px;
  min-height:40px;
  font-weight:bold;
  text-align:center;
}

.controls{
  margin-top:25px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.controls button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#22c55e,#4ade80);
}

.controls a{
  text-decoration:none;
}
</style>
</head>

<body>
<div class="app">

<h1>🎱 Cybersecurity Question App</h1>

<div class="top-bar">
  <div>
    Difficulty:
    <select id="difficulty">
      <option value="all">All</option>
      <option value="Beginner">Beginner</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select>
  </div>
  <div class="score">Score: <span id="score">0</span></div>
</div>

<div id="question" class="question">
  Click the button to get a random Security+ question.
</div>

<div id="answers" class="answers"></div>
<div id="feedback" class="feedback"></div>

<div class="controls">
  <button onclick="newQuestion()">Get Random Question</button>

  <a href="/lessons/cybersecurity/careers.html">
    <button>⬅ Careers</button>
  </a>

  <a href="/cybersecurity.html">
    <button>🔁 Cybersecurity Lessons</button>
  </a>

  <a href="/index.html">
    <button>🏠 Home</button>
  </a>
</div>

</div>

<script>
let score = 0;
let answered = false;
let currentQuestion = null;

const questions = [
/* BEGINNER */
{d:"Beginner",q:"What does the CIA triad represent?",a:["Confidentiality, Integrity, Availability","Control, Inspection, Authorization","Confidentiality, Internet, Access","Cybersecurity, Integrity, Availability"],c:0,e:"The CIA triad defines the three core security goals."},
{d:"Beginner",q:"What is phishing?",a:["Network scanning","Tricking users into giving information","Malware encryption","Password hashing"],c:1,e:"Phishing exploits human trust."},
{d:"Beginner",q:"What does MFA add?",a:["Encryption","Multiple verification factors","Faster logins","Firewall protection"],c:1,e:"MFA requires more than one verification factor."},
{d:"Beginner",q:"What is malware?",a:["Malicious software","Backup software","Security policy","Firewall"],c:0,e:"Malware is software designed to cause harm."},
{d:"Beginner",q:"Why are backups critical?",a:["They prevent attacks","They allow recovery","They block malware","They encrypt data"],c:1,e:"Backups allow systems to be restored."},

{
  d:"Beginner",
  cat:"threats",
  q:"Which type of attack tricks users into revealing sensitive information?",
  a:["Phishing","DDoS","Brute force","SQL injection"],
  c:0,
  e:"Phishing uses deceptive messages to steal credentials or data."
},
{
  d:"Beginner",
  cat:"IAM",
  q:"What is the PRIMARY benefit of multi-factor authentication (MFA)?",
  a:["Added verification beyond passwords","Faster login times","Easier password resets","Anonymous access"],
  c:0,
  e:"MFA requires multiple factors, reducing the impact of stolen passwords."
},
{
  d:"Beginner",
  cat:"architecture",
  q:"Which security device filters traffic based on rules?",
  a:["Firewall","Switch","Router","Access point"],
  c:0,
  e:"Firewalls inspect and control traffic using configured rules."
},
{
  d:"Beginner",
  cat:"operations",
  q:"Which policy defines acceptable employee behavior when using company systems?",
  a:["Acceptable Use Policy","Incident Response Plan","Disaster Recovery Plan","Change Management Policy"],
  c:0,
  e:"Acceptable Use Policies define how systems may be used."
},
{
  d:"Beginner",
  cat:"cryptography",
  q:"Which encryption type uses the same key for encryption and decryption?",
  a:["Symmetric","Asymmetric","Hashing","Tokenization"],
  c:0,
  e:"Symmetric encryption uses one shared secret key."
},

{
  d:"Intermediate",
  cat:"threats",
  q:"Which malware type disguises itself as legitimate software?",
  a:["Trojan","Worm","Rootkit","Spyware"],
  c:0,
  e:"Trojans rely on deception to gain access."
},
{
  d:"Intermediate",
  cat:"IAM",
  q:"Which access control principle grants only the permissions required to perform a job?",
  a:["Least privilege","Role-based access","Single sign-on","Federation"],
  c:0,
  e:"Least privilege limits access to only what is necessary."
},
{
  d:"Intermediate",
  cat:"architecture",
  q:"Which network design places public-facing servers in an isolated zone?",
  a:["DMZ","VLAN","Trusted zone","Intranet"],
  c:0,
  e:"A DMZ separates public services from internal networks."
},
{
  d:"Intermediate",
  cat:"operations",
  q:"Which document outlines steps to take after a security breach?",
  a:["Incident response plan","Acceptable use policy","Onboarding checklist","Risk register"],
  c:0,
  e:"Incident response plans guide actions after an incident."
},
{
  d:"Intermediate",
  cat:"cryptography",
  q:"What is the PRIMARY purpose of hashing?",
  a:["Data integrity","Confidentiality","Access control","Encryption"],
  c:0,
  e:"Hashes verify that data has not been altered."
},

{
  d:"Intermediate",
  cat:"response",
  q:"What is the FIRST step in incident response?",
  a:["Identification","Containment","Recovery","Eradication"],
  c:0,
  e:"Incidents must be identified before actions can be taken."
},
{
  d:"Intermediate",
  cat:"threats",
  q:"Which attack attempts to overload a system to make it unavailable?",
  a:["DDoS","Phishing","Spoofing","Privilege escalation"],
  c:0,
  e:"Distributed Denial-of-Service attacks flood systems with traffic."
},

{
  d:"Advanced",
  cat:"architecture",
  q:"Which security model focuses on never trusting devices by default?",
  a:["Zero Trust","Defense in Depth","Bell-LaPadula","Ring model"],
  c:0,
  e:"Zero Trust verifies every request regardless of network location."
},
{
  d:"Advanced",
  cat:"IAM",
  q:"Which authentication factor represents something you ARE?",
  a:["Biometric","Password","Smart card","PIN"],
  c:0,
  e:"Biometrics include fingerprints, retina scans, and facial recognition."
},
{
  d:"Advanced",
  cat:"cryptography",
  q:"Which algorithm is commonly used for digital signatures?",
  a:["RSA","AES","DES","SHA-1"],
  c:0,
  e:"RSA supports asymmetric encryption and digital signatures."
},
{
  d:"Advanced",
  cat:"response",
  q:"After containment, what is the NEXT incident response phase?",
  a:["Eradication","Identification","Preparation","Lessons learned"],
  c:0,
  e:"Eradication removes malicious artifacts from systems."
},
{
  d:"Advanced",
  cat:"operations",
  q:"Which activity ensures systems can be restored after a major failure?",
  a:["Disaster recovery","Change management","Hardening","Logging"],
  c:0,
  e:"Disaster recovery focuses on restoring services."
},
{
  d:"Advanced",
  cat:"threats",
  q:"Which attack exploits trust between systems or users?",
  a:["Man-in-the-middle","Brute force","Ransomware","Logic bomb"],
  c:0,
  e:"MITM attacks intercept communications between trusted parties."
},
{
  d:"Advanced",
  cat:"IAM",
  q:"Which control BEST enforces separation of duties?",
  a:["Role-based access control","Strong passwords","Encryption","Firewalls"],
  c:0,
  e:"RBAC restricts access based on job roles."
},
{
  d:"Advanced",
  cat:"cryptography",
  q:"Which hashing function is considered insecure and deprecated?",
  a:["MD5","SHA-256","SHA-3","bcrypt"],
  c:0,
  e:"MD5 is vulnerable to collisions and should not be used."
},
/* INTERMEDIATE */
{d:"Intermediate",q:"What is the FIRST step in incident response?",a:["Containment","Identification","Recovery","Eradication"],c:1,e:"An incident must be identified before action."},
{d:"Intermediate",q:"What does least privilege mean?",a:["Everyone is admin","Users get only required access","Privileges reset weekly","Access is temporary"],c:1,e:"Least privilege limits damage."},
{d:"Intermediate",q:"What attack targets people instead of systems?",a:["DoS","SQL Injection","Social engineering","Brute force"],c:2,e:"Social engineering manipulates human behavior."},
{d:"Intermediate",q:"What is lateral movement?",a:["External scanning","Movement inside a network","Traffic filtering","Firewall bypass"],c:1,e:"It describes spreading internally."},
{d:"Intermediate",q:"What does a firewall do?",a:["Encrypt traffic","Filter network traffic","Scan emails","Train users"],c:1,e:"Firewalls control traffic flow."},

/* ADVANCED */
{d:"Advanced",q:"Why preserve evidence during incidents?",a:["Compliance only","To support investigation","To speed recovery","To delete logs"],c:1,e:"Evidence is needed for analysis and legal reasons."},
{d:"Advanced",q:"What is network segmentation used for?",a:["Faster networks","Limiting attacker movement","Encrypting data","Easy access"],c:1,e:"Segmentation reduces lateral spread."},
{d:"Advanced",q:"What is Zero Trust?",a:["Trust internal users","Never trust, always verify","Disable MFA","Open access"],c:1,e:"Zero Trust requires continuous verification."},
{d:"Advanced",q:"What does a SIEM provide?",a:["Direct protection","Centralized logging","Encryption","Hardware security"],c:1,e:"SIEM correlates and analyzes logs."},
{d:"Advanced",q:"What is defense in depth?",a:["Single control","Layered security controls","Fast incident response","Cheap security"],c:1,e:"Multiple layers reduce risk."}
];

function newQuestion(){
  answered = false;
  document.getElementById("feedback").textContent = "";

  const difficulty = document.getElementById("difficulty").value;
  const pool = difficulty === "all"
    ? questions
    : questions.filter(q => q.d === difficulty);

  currentQuestion = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("question").textContent =
    "(" + currentQuestion.d + ") " + currentQuestion.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  currentQuestion.a.forEach((choice, index) => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(index, btn);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(index, btn){
  if(answered) return;
  answered = true;

  const allButtons = document.querySelectorAll(".answers button");
  allButtons.forEach((b, i) => {
    b.disabled = true;
    if(i === currentQuestion.c){
      b.classList.add("correct");
    }
  });

  if(index === currentQuestion.c){
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("feedback").textContent =
      "✅ Correct! " + currentQuestion.e;
  } else {
    btn.classList.add("incorrect");
    document.getElementById("feedback").textContent =
      "❌ " + currentQuestion.e;
  }
}
</script>

</body>
</html>
