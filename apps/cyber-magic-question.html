<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompTIA Security+ Practice Questions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:linear-gradient(135deg,#0b132b,#1c2541,#3a506b);
  color:#ffffff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:95%;
  max-width:1000px;
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

h1{
  text-align:center;
  background:linear-gradient(135deg,#00eaff,#00ffd5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.top{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
  font-weight:bold;
}

.tags{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.tag{
  padding:6px 12px;
  border-radius:999px;
  font-size:.75em;
  font-weight:bold;
}

.beginner{background:#22c55e;color:#052e16}
.intermediate{background:#facc15;color:#3b2f05}
.advanced{background:#f97316;color:#431407}

.threats{background:#fb7185;color:#4c0519}
.architecture{background:#38bdf8;color:#020617}
.operations{background:#a78bfa;color:#020617}
.iam{background:#34d399;color:#022c22}
.response{background:#fca5a5;color:#450a0a}
.cryptography{background:#818cf8;color:#020617}

.question{
  background:rgba(0,0,0,0.35);
  padding:22px;
  border-radius:16px;
  margin-bottom:15px;
}

.answers button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#00eaff);
  color:#001219;
}

.answers button.correct{background:#22c55e}
.answers button.incorrect{background:#ef4444;color:white}

.feedback{
  min-height:40px;
  font-weight:bold;
  margin-top:10px;
}

.summary{
  background:rgba(0,0,0,0.4);
  padding:22px;
  border-radius:16px;
}

.summary h2{color:#00eaff}
.hidden{display:none}
</style>
</head>

<body>
<div class="app">

<h1>🔐 Security+ Practice Questions</h1>

<div class="top hidden" id="status">
  <div id="progress"></div>
  <div>Score: <span id="score">0</span></div>
</div>

<div id="questionBox" class="hidden">
  <div id="tags" class="tags"></div>
  <div id="questionText" class="question"></div>
  <div id="answers" class="answers"></div>
  <div id="feedback" class="feedback"></div>
</div>

<div id="summaryBox" class="summary hidden"></div>

</div>

<script>
/* ---------- UTIL ---------- */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

/* ---------- QUESTION BANK (40) ---------- */
const questions = [
{d:"Beginner",cat:"threats",q:"Which attack relies on tricking users into revealing credentials?",a:["Phishing","DDoS","Spoofing","SQL injection"],c:0,e:"Phishing targets human trust rather than systems."},
{d:"Beginner",cat:"iam",q:"What does MFA require?",a:["Two or more authentication factors","Long passwords","Encryption","VPN access"],c:0,e:"MFA combines multiple authentication factors."},
{d:"Beginner",cat:"architecture",q:"Which device filters traffic using rules?",a:["Firewall","Switch","Router","Hub"],c:0,e:"Firewalls control traffic based on policy."},
{d:"Beginner",cat:"cryptography",q:"Which encryption uses the same key to encrypt and decrypt data?",a:["Symmetric","Asymmetric","Hashing","Tokenization"],c:0,e:"Symmetric encryption uses a shared secret key."},
{d:"Beginner",cat:"operations",q:"Which policy defines acceptable use of company systems?",a:["Acceptable Use Policy","Disaster Recovery Plan","Incident Response Plan","Change Policy"],c:0,e:"AUP defines permitted behavior."},

{d:"Intermediate",cat:"threats",q:"Which malware disguises itself as legitimate software?",a:["Trojan","Worm","Rootkit","Spyware"],c:0,e:"Trojans rely on deception."},
{d:"Intermediate",cat:"iam",q:"Which principle grants only required permissions?",a:["Least privilege","Separation of duties","Federation","SSO"],c:0,e:"Least privilege minimizes access."},
{d:"Intermediate",cat:"architecture",q:"Which design isolates public servers from internal networks?",a:["DMZ","VLAN","Intranet","Trusted zone"],c:0,e:"DMZs reduce exposure."},
{d:"Intermediate",cat:"cryptography",q:"What is hashing primarily used for?",a:["Integrity","Confidentiality","Authentication","Authorization"],c:0,e:"Hashes detect changes to data."},
{d:"Intermediate",cat:"response",q:"What is the FIRST step in incident response?",a:["Identification","Containment","Recovery","Eradication"],c:0,e:"Incidents must be identified first."},

{d:"Intermediate",cat:"threats",q:"Which attack floods systems to make them unavailable?",a:["DDoS","MITM","Spoofing","Privilege escalation"],c:0,e:"DDoS exhausts resources."},
{d:"Intermediate",cat:"operations",q:"Which plan restores systems after major failure?",a:["Disaster recovery","Change management","Hardening","Logging"],c:0,e:"DR focuses on restoration."},
{d:"Intermediate",cat:"iam",q:"Which factor represents something you ARE?",a:["Biometric","Password","Smart card","PIN"],c:0,e:"Biometrics are inherent traits."},
{d:"Intermediate",cat:"architecture",q:"Which model assumes no implicit trust?",a:["Zero Trust","Defense in Depth","Bell-LaPadula","Ring model"],c:0,e:"Zero Trust verifies everything."},
{d:"Intermediate",cat:"cryptography",q:"Which algorithm is asymmetric?",a:["RSA","AES","DES","3DES"],c:0,e:"RSA uses public/private keys."},

{d:"Advanced",cat:"response",q:"What comes AFTER containment in incident response?",a:["Eradication","Identification","Preparation","Lessons learned"],c:0,e:"Eradication removes the threat."},
{d:"Advanced",cat:"threats",q:"Which attack intercepts communication between two parties?",a:["MITM","Brute force","Logic bomb","Ransomware"],c:0,e:"MITM sits between trusted parties."},
{d:"Advanced",cat:"cryptography",q:"Which hash is considered insecure?",a:["MD5","SHA-256","SHA-3","bcrypt"],c:0,e:"MD5 is deprecated."},
{d:"Advanced",cat:"architecture",q:"Which control limits attacker movement inside a network?",a:["Segmentation","Encryption","NAT","Monitoring"],c:0,e:"Segmentation restricts lateral movement."},
{d:"Advanced",cat:"iam",q:"Which control enforces separation of duties?",a:["RBAC","Strong passwords","Firewalls","IDS"],c:0,e:"RBAC assigns permissions by role."},

{
  d:"Beginner",
  cat:"threats",
  q:"Which type of malware encrypts files and demands payment?",
  a:["Ransomware","Spyware","Rootkit","Worm"],
  c:0,
  e:"Ransomware encrypts data and demands payment for decryption."
},
{
  d:"Beginner",
  cat:"architecture",
  q:"Which device detects suspicious activity but does NOT block traffic?",
  a:["IDS","Firewall","Proxy","WAF"],
  c:0,
  e:"Intrusion Detection Systems monitor and alert but do not block."
},
{
  d:"Beginner",
  cat:"iam",
  q:"Which authentication factor is something you HAVE?",
  a:["Smart card","Password","Fingerprint","PIN"],
  c:0,
  e:"Smart cards and tokens are possession factors."
},
{
  d:"Beginner",
  cat:"cryptography",
  q:"Which term describes converting plaintext into unreadable text?",
  a:["Encryption","Hashing","Salting","Tokenization"],
  c:0,
  e:"Encryption transforms plaintext into ciphertext."
},
{
  d:"Beginner",
  cat:"operations",
  q:"Which document defines how security incidents are reported?",
  a:["Incident response plan","Acceptable use policy","SLAs","Change control"],
  c:0,
  e:"Incident response plans define reporting and response procedures."
},

{
  d:"Intermediate",
  cat:"threats",
  q:"Which attack uses previously captured authentication data?",
  a:["Replay attack","Phishing","Brute force","Spoofing"],
  c:0,
  e:"Replay attacks reuse captured credentials or packets."
},
{
  d:"Intermediate",
  cat:"architecture",
  q:"Which solution filters web traffic at the application layer?",
  a:["Web application firewall","Layer 3 firewall","Router","Switch"],
  c:0,
  e:"WAFs protect against application‑layer attacks."
},
{
  d:"Intermediate",
  cat:"iam",
  q:"Which solution allows users to authenticate once and access multiple systems?",
  a:["Single sign-on","MFA","RBAC","Federation only"],
  c:0,
  e:"SSO reduces repeated authentication prompts."
},
{
  d:"Intermediate",
  cat:"operations",
  q:"Which practice reduces the attack surface of systems?",
  a:["System hardening","Logging","Monitoring","Auditing"],
  c:0,
  e:"Hardening removes unnecessary services and configurations."
},
{
  d:"Intermediate",
  cat:"cryptography",
  q:"Which encryption is MOST commonly used for data at rest?",
  a:["AES","RSA","SHA-256","ECC"],
  c:0,
  e:"AES is efficient and widely used for stored data."
},

{
  d:"Intermediate",
  cat:"response",
  q:"Which phase focuses on returning systems to normal operation?",
  a:["Recovery","Identification","Containment","Eradication"],
  c:0,
  e:"Recovery restores services after an incident."
},
{
  d:"Intermediate",
  cat:"threats",
  q:"Which malware can spread without user interaction?",
  a:["Worm","Trojan","Spyware","Logic bomb"],
  c:0,
  e:"Worms self‑propagate across systems."
},
{
  d:"Intermediate",
  cat:"architecture",
  q:"Which concept ensures no single point of failure exists?",
  a:["Redundancy","Segmentation","Hardening","Least privilege"],
  c:0,
  e:"Redundancy improves availability."
},
{
  d:"Intermediate",
  cat:"iam",
  q:"Which access model assigns permissions based on job function?",
  a:["RBAC","DAC","MAC","ABAC"],
  c:0,
  e:"Role‑Based Access Control ties access to job roles."
},

{
  d:"Advanced",
  cat:"threats",
  q:"Which attack embeds malicious code into a trusted website?",
  a:["Cross‑site scripting","DDoS","Spoofing","Brute force"],
  c:0,
  e:"XSS injects malicious scripts into trusted sites."
},
{
  d:"Advanced",
  cat:"cryptography",
  q:"Which concept ensures encrypted data cannot be altered undetected?",
  a:["Integrity","Availability","Non‑repudiation","Confidentiality"],
  c:0,
  e:"Integrity detects unauthorized changes."
},
{
  d:"Advanced",
  cat:"architecture",
  q:"Which control protects against distributed attacks by spreading traffic?",
  a:["Load balancer","Firewall","IDS","NAT"],
  c:0,
  e:"Load balancers distribute traffic to reduce impact."
},
{
  d:"Advanced",
  cat:"operations",
  q:"Which testing validates disaster recovery plans?",
  a:["Tabletop exercises","Penetration tests","Code reviews","Vulnerability scans"],
  c:0,
  e:"Tabletop exercises simulate incidents without disruption."
},
{
  d:"Advanced",
  cat:"iam",
  q:"Which model enforces access rules based on data sensitivity labels?",
  a:["MAC","DAC","RBAC","ABAC"],
  c:0,
  e:"Mandatory Access Control uses classification labels."
},
{
  d:"Advanced",
  cat:"response",
  q:"Which step documents lessons learned after an incident?",
  a:["Post‑incident review","Identification","Containment","Eradication"],
  c:0,
  e:"Lessons learned improve future response."
},

{
  d:"Advanced",
  cat:"threats",
  q:"Which attack escalates privileges after initial access?",
  a:["Privilege escalation","Brute force","DDoS","Sniffing"],
  c:0,
  e:"Privilege escalation increases attacker permissions."
},
{
  d:"Advanced",
  cat:"cryptography",
  q:"Which practice adds randomness to passwords before hashing?",
  a:["Salting","Tokenization","Encryption","Signing"],
  c:0,
  e:"Salting protects against rainbow table attacks."
},
{
  d:"Advanced",
  cat:"architecture",
  q:"Which solution provides inspection of encrypted traffic?",
  a:["SSL inspection","NAT","VPN passthrough","Port forwarding"],
  c:0,
  e:"SSL inspection decrypts, inspects, and re‑encrypts traffic."
},
{
  d:"Advanced",
  cat:"operations",
  q:"Which metric BEST indicates risk exposure?",
  a:["Risk likelihood and impact","Number of users","System uptime","Patch frequency"],
  c:0,
  e:"Risk is measured by likelihood and impact."
},
/* additional questions to reach 40 */
{d:"Advanced",cat:"operations",q:"Which process ensures vulnerabilities are addressed?",a:["Patch management","Change control","Auditing","Logging"],c:0,e:"Patching fixes known issues."},
{d:"Beginner",cat:"cryptography",q:"What does encryption primarily provide?",a:["Confidentiality","Integrity","Availability","Authentication"],c:0,e:"Encryption protects data from unauthorized viewing."},
{d:"Beginner",cat:"response",q:"What should be preserved during an investigation?",a:["Evidence","Productivity","Backups","Uptime"],c:0,e:"Evidence supports analysis."},
{d:"Intermediate",cat:"operations",q:"Which log tracks authentication events?",a:["Security log","System log","Application log","Traffic log"],c:0,e:"Security logs record logins."},
{d:"Advanced",cat:"architecture",q:"Which approach uses multiple overlapping defenses?",a:["Defense in depth","Zero Trust","Least privilege","Hardening"],c:0,e:"Layered security reduces risk."}
];

/* ---------- STATE ---------- */
let index=0, score=0;
let stats={difficulty:{},category:{}};

/* ---------- START ---------- */
start();

function start(){
  shuffle(questions);
  index=0; score=0;
  stats={difficulty:{},category:{}};
  document.getElementById("score").textContent=0;
  document.getElementById("summaryBox").classList.add("hidden");
  document.getElementById("questionBox").classList.remove("hidden");
  document.getElementById("status").classList.remove("hidden");
  load();
}

function load(){
  const q=questions[index];
  document.getElementById("progress").textContent =
    `Question ${index+1} of ${questions.length}`;

  document.getElementById("tags").innerHTML =
    `<span class="tag ${q.d.toLowerCase()}">${q.d}</span>
     <span class="tag ${q.cat}">${q.cat.toUpperCase()}</span>`;

  document.getElementById("questionText").textContent = q.q;

  let answers=q.a.map((t,i)=>({t,correct:i===q.c}));
  shuffle(answers);

  const box=document.getElementById("answers");
  box.innerHTML="";
  answers.forEach(ans=>{
    const b=document.createElement("button");
    b.textContent=ans.t;
    b.onclick=()=>check(ans.correct,q);
    box.appendChild(b);
  });

  document.getElementById("feedback").textContent="";
}

function check(correct,q){
  document.querySelectorAll(".answers button").forEach(b=>b.disabled=true);

  stats.difficulty[q.d] ??= {c:0,t:0};
  stats.category[q.cat] ??= {c:0,t:0};
  stats.difficulty[q.d].t++;
  stats.category[q.cat].t++;

  if(correct){
    score++;
    stats.difficulty[q.d].c++;
    stats.category[q.cat].c++;
    document.getElementById("score").textContent=score;
    document.getElementById("feedback").textContent="✅ Correct. "+q.e;
  }else{
    document.getElementById("feedback").textContent="❌ "+q.e;
  }

  setTimeout(()=>{
    index++;
    index<questions.length ? load() : summary();
  },2000);
}

/* ---------- SUMMARY ---------- */
function summary(){
  document.getElementById("questionBox").classList.add("hidden");

  let html=`<h2>Results</h2>
  <p><strong>Final Score:</strong> ${score}/${questions.length}</p>
  <h3>Performance by Difficulty</h3><ul>`;

  for(const d in stats.difficulty){
    const s=stats.difficulty[d];
    html+=`<li>${d}: ${s.c}/${s.t}</li>`;
  }

  html+=`</ul><h3>Performance by Domain</h3><ul>`;

  for(const c in stats.category){
    const s=stats.category[c];
    html+=`<li>${c.toUpperCase()}: ${s.c}/${s.t}</li>`;
  }

  html+=`</ul>
  <h3>Where to Improve</h3>
  <p>Focus on domains with the lowest correct percentage.</p>
  <button onclick="start()">Restart</button>`;

  const box=document.getElementById("summaryBox");
  box.innerHTML=html;
  box.classList.remove("hidden");
}
</script>

</body>
</html>
``
