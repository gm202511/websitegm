
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompTIA A+ Scenario Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial, sans-serif;
  background:linear-gradient(135deg,#0b132b,#1c2541,#3a506b);
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.app{
  width:95%;
  max-width:1100px;
  background:rgba(255,255,255,0.08);
  padding:32px;
  border-radius:20px;
  box-shadow:0 20px 45px rgba(0,0,0,.45);
}
h1{
  text-align:center;
  background:linear-gradient(135deg,#00eaff,#00ffd5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.selector{text-align:center;margin:20px 0;}
.selector button{
  padding:14px 26px;
  margin:0 8px;
  border:none;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#00eaff,#38bdf8);
  color:#001f2f;
}
.top{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-weight:bold;
}
.scenario{
  background:rgba(0,0,0,.35);
  padding:22px;
  border-radius:16px;
  margin-bottom:12px;
}
.tags{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.tag{padding:6px 12px;border-radius:999px;font-size:.75em;font-weight:bold;}

.beginner{background:#22c55e;color:#052e16}
.intermediate{background:#facc15;color:#3b2f05}
.advanced{background:#f97316;color:#431407}
.hardware{background:#38bdf8;color:#020617}
.os{background:#a78bfa;color:#020617}
.networking{background:#818cf8;color:#020617}
.security{background:#fca5a5;color:#450a0a}
.mobile{background:#34d399;color:#022c22}
.printer{background:#fb7185;color:#4c0519}

.answers button{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#38bdf8,#00eaff);
}
.answers button.correct{background:#22c55e}
.answers button.incorrect{background:#ef4444;color:white}

.feedback{min-height:36px;font-weight:bold;margin-top:10px}

.summary{
  background:rgba(0,0,0,.4);
  padding:22px;
  border-radius:16px;
}
.summary button{
  margin-top:14px;
  padding:12px 20px;
  border:none;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#00eaff,#38bdf8);
  color:#001f2f;
}
.hidden{display:none}
</style>
</head>

<body>
<div class="app">

<h1>🖥️ CompTIA A+ Scenario Trainer</h1>

<div class="selector">
  <button onclick="start(core1)">A+ Core 1 (220‑1101)</button>
  <button onclick="start(core2)">A+ Core 2 (220‑1102)</button>
</div>

<div id="status" class="top hidden">
  <div id="progress"></div>
  <div>Score: <span id="score">0</span></div>
</div>

<div id="scenarioBox" class="hidden">
  <div id="tags" class="tags"></div>
  <div id="scenarioText" class="scenario"></div>
  <div id="answers" class="answers"></div>
  <div id="feedback" class="feedback"></div>
</div>

<div id="summaryBox" class="summary hidden"></div>

</div>

<script>
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

let set=[],index=0,score=0;
let stats={difficulty:{},category:{}};

function start(selected){
  set=selected;
  index=0;
  score=0;
  stats={difficulty:{},category:{}};
  document.getElementById("score").textContent=0;
  document.getElementById("summaryBox").classList.add("hidden");
  document.getElementById("scenarioBox").classList.remove("hidden");
  document.getElementById("status").classList.remove("hidden");
  load();
}

function load(){
  const q=set[index];
  document.getElementById("progress").textContent=`Scenario ${index+1} of ${set.length}`;
  document.getElementById("tags").innerHTML=
    `<span class="tag ${q.d.toLowerCase()}">${q.d}</span>
     <span class="tag ${q.cat}">${q.cat.toUpperCase()}</span>`;
  document.getElementById("scenarioText").textContent=q.s;

  let ans=q.a.map((t,i)=>({t,correct:i===q.c}));
  shuffle(ans);
  const box=document.getElementById("answers");
  box.innerHTML="";
  ans.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=o.t;
    b.onclick=()=>check(o.correct,q);
    box.appendChild(b);
  });
  document.getElementById("feedback").textContent="";
}

function check(correct,q){
  document.querySelectorAll(".answers button").forEach(b=>b.disabled=true);
  stats.difficulty[q.d]??={c:0,t:0};
  stats.category[q.cat]??={c:0,t:0};
  stats.difficulty[q.d].t++;
  stats.category[q.cat].t++;
  if(correct){
    score++;
    stats.difficulty[q.d].c++;
    stats.category[q.cat].c++;
    document.getElementById("score").textContent=score;
    document.getElementById("feedback").textContent="✅ "+q.e;
  }else{
    document.getElementById("feedback").textContent="❌ "+q.e;
  }
  setTimeout(()=>{index<set.length-1?(++index,load()):showSummary()},2000);
}

function showSummary(){
  document.getElementById("scenarioBox").classList.add("hidden");
  let html=`<h2>Run Summary</h2>
  <p><strong>Final Score:</strong> ${score}/${set.length}</p>
  <h3>By Difficulty</h3><ul>`;
  for(const d in stats.difficulty){
    html+=`<li>${d}: ${stats.difficulty[d].c}/${stats.difficulty[d].t}</li>`;
  }
  html+=`</ul><h3>By Category</h3><ul>`;
  for(const c in stats.category){
    html+=`<li>${c.toUpperCase()}: ${stats.category[c].c}/${stats.category[c].t}</li>`;
  }
  html+=`</ul><button onclick="start(set)">Restart</button>`;
  const box=document.getElementById("summaryBox");
  box.innerHTML=html;
  box.classList.remove("hidden");
}
</script>
