<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Meter | IT Foundations</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Segoe UI", Arial, sans-serif;
  background:linear-gradient(135deg,#0b132b,#1c2541,#3a506b);
  color:#ffffff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  background:rgba(255,255,255,0.08);
  padding:35px;
  border-radius:20px;
  max-width:720px;
  width:92%;
  box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

h1{
  text-align:center;
  margin-bottom:10px;
  background:linear-gradient(135deg,#00eaff,#00ffd5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  opacity:0.9;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:14px;
  font-size:1.1em;
  border-radius:10px;
  border:none;
  margin-bottom:18px;
}

.bar{
  height:14px;
  border-radius:999px;
  background:#334155;
  overflow:hidden;
  margin-bottom:10px;
}

.bar-fill{
  height:100%;
  width:0%;
  transition:width .3s, background .3s;
}

.strength{
  text-align:center;
  font-weight:bold;
  margin-bottom:6px;
}

.cracktime{
  text-align:center;
  margin-bottom:18px;
  font-style:italic;
  color:#e5e7eb;
}

.feedback{
  background:rgba(0,0,0,0.25);
  padding:16px;
  border-radius:12px;
  font-size:0.95em;
  line-height:1.5;
}
</style>
</head>

<body>
<div class="app">

<h1>🔐 Password Strength Meter</h1>
<p class="subtitle">
Evaluate password strength and estimated offline crack time.
</p>

<input type="password" id="password" placeholder="Enter a password…" oninput="checkPassword()">

<div class="bar"><div id="barFill" class="bar-fill"></div></div>
<div id="strengthText" class="strength">Strength: —</div>
<div id="crackTime" class="cracktime"></div>
<div id="feedback" class="feedback"></div>

</div>

<script>
function formatTime(seconds){
  const units=[
    {l:"seconds",v:1},
    {l:"minutes",v:60},
    {l:"hours",v:3600},
    {l:"days",v:86400},
    {l:"years",v:31536000},
    {l:"centuries",v:3153600000}
  ];
  for(let i=units.length-1;i>=0;i--){
    if(seconds>=units[i].v){
      return "~"+(seconds/units[i].v).toFixed(2)+" "+units[i].l;
    }
  }
  return "~0 seconds";
}

function checkPassword(){
  const pw=password.value;
  const bar=barFill;
  const strengthEl=strengthText;
  const crack=crackTime;
  const feedback=feedbackEl=document.getElementById("feedback");

  if(!pw){
    bar.style.width="0%";
    bar.style.background="#334155";
    strengthEl.textContent="Strength: —";
    crack.textContent="";
    feedback.textContent="Passwords should be long, unique, and difficult to guess.";
    return;
  }

  let charset=0;
  if(/[a-z]/.test(pw)) charset+=26;
  if(/[A-Z]/.test(pw)) charset+=26;
  if(/[0-9]/.test(pw)) charset+=10;
  if(/[^A-Za-z0-9]/.test(pw)) charset+=32;

  let strength="Weak",width="40%",color="#f97316";
  if(pw.length>=14 && charset>=72){
    strength="Very Strong"; width="100%"; color="#22c55e";
  }else if(pw.length>=12 && charset>=52){
    strength="Strong"; width="80%"; color="#4ade80";
  }else if(pw.length>=10){
    strength="Moderate"; width="60%"; color="#facc15";
  }

  bar.style.width=width;
  bar.style.background=color;
  strengthEl.textContent="Strength: "+strength;

  const guessesPerSecond=1e9;
  const combos=Math.pow(charset,pw.length);
  crack.textContent=
    "Estimated crack time (offline): "+
    formatTime(combos/guessesPerSecond)+
    " (varies by hardware)";

  /* ✅ FINAL FEEDBACK LOGIC */
  if(pw.length>=14 && charset>=72){
    feedback.innerHTML=
      "<strong>Good choice.</strong> This password is long and high‑entropy. "+
      "Never reuse it and always enable MFA.";
  }
  else if(pw.length>=12){
    feedback.innerHTML=
      "<strong>Solid password.</strong> This would be acceptable in most real‑world environments. "+
      "Additional length is always better.";
  }
  else{
    feedback.innerHTML=
      "<strong>Needs improvement.</strong> Increase length for the biggest security gain.";
  }
}
</script>

</body>
</html>
