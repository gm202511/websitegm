<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Cybersecurity Pathway</title>
    <style>
        body { background-color: #f4f4f4; font-family: Arial, sans-serif; }
        h1, h2 { background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .card:hover {
            border: 2px solid #00d4ff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            transform: scale(1.05);
        }
        .cta-button {
            background-color: #00d4ff; 
            color: white; 
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .cta-button:hover {
            background-color: #008cba;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Cybersecurity Pathway</h1>
    <div class="card">
        <h2>Learn About Cybersecurity</h2>
        <p>Discover the fundamentals of cybersecurity, including data protection, risk management, and threat analysis.</p>
        <a class="cta-button" href="#">Get Started</a>
    </div>
</body>
</html>
